name: Gradle build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        if: always()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ./build
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle') }}
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Build with Gradle
        run: ./gradlew clean build
      - name: Archive artifacts
        uses: actions/upload-artifact@v2
        with:
          name: artifacts
          path: build/libs
      - name: Archive code reports
        uses: actions/upload-artifact@v2
        if: always()
        with:
          name: code-reports
          path: build/reports

  publish:
    runs-on: ubuntu-latest
    needs: build
#    if: ${{github.repository == 'igniterealtime/openfire-passwordreset-plugin' && github.ref == 'refs/heads/master' && github.event_name == 'push'}}
    steps:
      - uses: actions/checkout@v2
        with:
          # Defend against another commit quickly following the first
          # We want the one that's been tested, rather than the head of master
          ref: ${{ github.event.push.after }}
      - uses: actions/cache@v2
        if: always()
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ./build
          key: ${{ runner.os }}-gradle-${{ hashFiles('*.gradle') }}
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Publish
        run: ./gradlew publish
        env:
          IGNITE_REALTIME_MAVEN_USERNAME: ${{ secrets.IGNITE_REALTIME_MAVEN_USERNAME }}
          IGNITE_REALTIME_MAVEN_PASSWORD: ${{ secrets.IGNITE_REALTIME_MAVEN_PASSWORD }}